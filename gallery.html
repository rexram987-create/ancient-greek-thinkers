<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גלריית הדמויות | אנשי הרוח של יוון העתיקה</title>
  <link rel="stylesheet" href="styles.css?v=15" />
  <style>
    .gallery-hero,
    .gallery-section {
      background: rgba(29, 24, 19, 0.9);
      border: 1px solid rgba(244, 234, 219, 0.16);
      border-radius: 22px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      padding: clamp(1.2rem, 4vw, 2rem);
    }

    .gallery-hero h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1.05;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .gallery-card {
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(212, 161, 95, 0.22);
      background: rgba(38, 31, 24, 0.92);
      border-radius: 18px;
    }

    .gallery-card img,
    .gallery-placeholder {
      display: block;
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #261f18;
    }

    .gallery-placeholder {
      display: grid;
      place-items: center;
      color: #d4a15f;
      font-size: 3rem;
      font-weight: 700;
    }

    .gallery-card figcaption {
      padding: 0.9rem;
      color: #c8b79e;
      line-height: 1.55;
    }

    .gallery-card strong {
      display: block;
      color: #d4a15f;
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="ניווט ראשי">
    <a class="nav-brand" href="index.html">← חזרה לדף הבית</a>
    <div class="nav-links">
      <a href="#main-gallery">גלריה</a>
      <a href="people/homer.html">הומרוס</a>
    </div>
  </nav>

  <main class="home-shell">
    <header class="gallery-hero">
      <p class="eyebrow">גלריה כללית</p>
      <h1>גלריית אנשי הרוח</h1>
      <p class="intro-text">דף מרכזי לתמונות ייצוגיות, פסלים, כתבי יד ואיורים של 13 אנשי הרוח המרכזיים של יוון העתיקה.</p>
    </header>

    <section id="main-gallery" class="gallery-section">
      <p class="eyebrow">13 הדמויות</p>
      <h2>תמונות הדמויות</h2>
      <div class="gallery-grid">
        <figure class="gallery-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Homer_At_the_British_Museum_2024_%283x4_cropped%29.jpg/500px-Homer_At_the_British_Museum_2024_%283x4_cropped%29.jpg" alt="פסל הומרוס" />
          <figcaption><strong>הומרוס</strong>פסל שיש של הומרוס, מתוך ויקיפדיה/Wikimedia. <br><a href="people/homer.html">לעמוד הומרוס</a></figcaption>
        </figure>

        <figure class="gallery-card"><div class="gallery-placeholder">Π</div><figcaption><strong>פיתגורס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Η</div><figcaption><strong>הרקליטוס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Δ</div><figcaption><strong>דמוקריטוס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Ι</div><figcaption><strong>היפוקרטס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Η</div><figcaption><strong>הרודוטוס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Θ</div><figcaption><strong>תוקידידס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Σ</div><figcaption><strong>סוקרטס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Π</div><figcaption><strong>אפלטון</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Α</div><figcaption><strong>אריסטו</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Ε</div><figcaption><strong>אוקלידס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Α</div><figcaption><strong>ארכימדס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
        <figure class="gallery-card"><div class="gallery-placeholder">Σ</div><figcaption><strong>סופוקלס</strong>תמונה תתווסף בהמשך.</figcaption></figure>
      </div>
    </section>
  </main>
</body>
</html>
